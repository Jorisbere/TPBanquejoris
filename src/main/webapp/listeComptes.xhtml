<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:h="jakarta.faces.html"
      xmlns:p="primefaces"
      xmlns:f="jakarta.faces.core">

    <body>

        <ui:composition template="./WEB-INF/templates/template_defaut.xhtml">

            <ui:define name="top">
                Listes des comptes
            </ui:define>

            <ui:define name="content">
                <h:form>
                    <p:dataTable value="#{listeComptes.listeCpte}" var="compte" widgetVar="listTable"
                                 emptyMessage="Aucun client avec ce critère"
                                 paginator="true"
                                 rows="10"
                                 rowsPerPageTemplate="2,4,8,10"
                                 paginatorTemplate="{CurrentPageReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink} {RowsPerPageDropdown}">

                        <f:facet name="header">
                            <p:outputPanel>
                                <h:outputText value="Recherche dans tous les champs de recherche"/>
                                <p:inputText id="globalFilter" onkeyup="PF('listTable').filter()"
                                             style="width:150px"/>
                            </p:outputPanel>
                        </f:facet>

                        <p:column>
                            <f:facet name="header">
                                <h:outputText value="Id"/>
                            </f:facet>
                            <h:outputText value="#{compte.id}"/>
                        </p:column>

                        <p:column sortBy="#{compte.nom}" filterBy="#{compte.solde}">
                            <f:facet name="header">
                                <h:outputText value="Nom"/>
                            </f:facet>
                            <h:outputText value="#{compte.nom}"/>
                        </p:column>

                        <p:column sortBy="#{compte.solde}" filterBy="#{compte.nom}">
                            <f:facet name="header">
                                <h:outputText value="Solde"/>
                            </f:facet>
                            <h:outputText value="#{compte.solde}"/>
                        </p:column>
                    </p:dataTable>  
                </h:form>
                <h:messages globalOnly="true" style="color: red; margin-top: 10px;"/>
            </ui:define>

        </ui:composition>

    </body>
</html>
